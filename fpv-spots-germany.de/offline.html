<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPV Spots Germany – Offline</title>
    <meta name="theme-color" content="#212529">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #212529;
            color: #e9ecef;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        img { max-width: 120px; margin-bottom: 1.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #adb5bd; margin-bottom: 2rem; max-width: 320px; }
        button {
            background: #198754;
            color: #fff;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.375rem;
            font-size: 1rem;
            cursor: pointer;
        }
        button:active { background: #146c43; }
    </style>
</head>
<body>
    <main>
        <img src="/public/imgs/logo.png" alt="FPV Spots Germany Logo" width="120" height="120">
        <h1>Du bist offline</h1>
        <p>Bitte überprüfe deine Internetverbindung und versuche es erneut.</p>
        <button type="button" onclick="location.reload()">Erneut versuchen</button>
    </main>
</body>
</html>
